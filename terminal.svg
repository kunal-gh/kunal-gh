<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="450">
  <style>
    /* Global styles */
    .bg { fill: #080C14; }
    .grid { stroke: #141B2E; stroke-width: 1; stroke-dasharray: 4,4; }
    .panel-bg { fill: #0D1424; stroke: #1F2E4D; stroke-width: 1; rx: 5; }
    .text { font-family: 'Fira Code', 'Consolas', monospace; font-size: 12px; fill: #E2E8F0; }
    .text-dim { fill: #64748B; }
    .accent-cyan { fill: #00F0FF; }
    .stroke-cyan { stroke: #00F0FF; }
    .accent-green { fill: #10B981; }
    .stroke-green { stroke: #10B981; }
    .accent-purple { fill: #A855F7; }
    .accent-red { fill: #EF4444; }
    
    /* Animations */
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; filter: drop-shadow(0 0 4px #00F0FF); }
    }
    .pulse-dot { animation: pulse 2s infinite ease-in-out; }
    
    @keyframes scanline {
      0% { transform: translateY(0); }
      100% { transform: translateY(450px); }
    }
    .scan { stroke: #00F0FF; stroke-width: 0.5; opacity: 0.15; animation: scanline 6s linear infinite; }
    
    /* Bar animations */
    @keyframes bar-fill-1 { 0%, 100% { width: 45px; } 50% { width: 75px; } }
    @keyframes bar-fill-2 { 0%, 100% { width: 85px; } 50% { width: 60px; } }
    @keyframes bar-fill-3 { 0%, 100% { width: 30px; } 50% { width: 90px; } }
    .bar-1 { animation: bar-fill-1 3s infinite ease-in-out; }
    .bar-2 { animation: bar-fill-2 4s infinite ease-in-out; }
    .bar-3 { animation: bar-fill-3 5s infinite ease-in-out; }

    /* Scroll log animations */
    @keyframes scroll-logs {
      0%, 9% { transform: translateY(0); }
      10%, 19% { transform: translateY(-22px); }
      20%, 29% { transform: translateY(-44px); }
      30%, 39% { transform: translateY(-66px); }
      40%, 49% { transform: translateY(-88px); }
      50%, 59% { transform: translateY(-110px); }
      60%, 69% { transform: translateY(-132px); }
      70%, 79% { transform: translateY(-154px); }
      80%, 89% { transform: translateY(-176px); }
      90%, 100% { transform: translateY(-198px); }
    }
    .log-container { animation: scroll-logs 20s steps(10) infinite; }
  </style>

  <defs>
    <!-- Grid Pattern -->
    <pattern id="grid-pattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="40" y2="0" class="grid" />
      <line x1="0" y1="0" x2="0" y2="40" class="grid" />
    </pattern>
    <!-- Glowing Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />
  <rect width="100%" height="100%" fill="url(#grid-pattern)" />
  
  <!-- Header Bar -->
  <rect x="15" y="15" width="800" height="40" class="panel-bg" />
  <circle cx="35" cy="35" r="5" class="accent-green pulse-dot" filter="url(#glow)" />
  <text x="50" y="39" class="text" font-weight="bold">KUNAL_GH // AGENTIC_AI_TELEMETRY</text>
  <text x="500" y="39" class="text text-dim">STATUS: <tspan class="accent-green">ACTIVE</tspan> | SYSTEM: <tspan class="accent-cyan">STABLE</tspan> | LATENCY: <tspan class="accent-purple">12ms</tspan></text>
  
  <!-- Panel Left: System Registry -->
  <rect x="15" y="70" width="280" height="365" class="panel-bg" />
  <text x="30" y="95" class="text" font-weight="bold" fill="#00F0FF">CORE COMPONENT STATUS</text>
  <line x1="30" y1="105" x2="280" y2="105" stroke="#1F2E4D" stroke-width="1" />
  
  <!-- ANDROMEDA -->
  <g transform="translate(30, 120)">
    <circle cx="5" cy="10" r="4" class="accent-cyan pulse-dot" />
    <text x="20" y="14" class="text" font-weight="bold">ANDROMEDA (Agents)</text>
    <text x="20" y="30" class="text text-dim" font-size="10">Orchestrator: LangGraph</text>
    <rect x="20" y="38" width="100" height="6" fill="#141B2E" rx="3" />
    <rect x="20" y="38" width="85" height="6" class="accent-cyan bar-1" rx="3" />
    <text x="130" y="44" class="text text-dim" font-size="10">85% LOAD</text>
  </g>
  
  <!-- CENTAURUS -->
  <g transform="translate(30, 195)">
    <circle cx="5" cy="10" r="4" class="accent-cyan pulse-dot" />
    <text x="20" y="14" class="text" font-weight="bold">CENTAURUS (Knowledge)</text>
    <text x="20" y="30" class="text text-dim" font-size="10">Database: Neo4j + Qdrant</text>
    <rect x="20" y="38" width="100" height="6" fill="#141B2E" rx="3" />
    <rect x="20" y="38" width="60" height="6" class="accent-cyan bar-2" rx="3" />
    <text x="130" y="44" class="text text-dim" font-size="10">60% MEM</text>
  </g>

  <!-- OSKAR -->
  <g transform="translate(30, 270)">
    <circle cx="5" cy="10" r="4" class="accent-cyan pulse-dot" />
    <text x="20" y="14" class="text" font-weight="bold">OSKAR (AI Safety)</text>
    <text x="20" y="30" class="text text-dim" font-size="10">Entropy-Based Uncertainty</text>
    <rect x="20" y="38" width="100" height="6" fill="#141B2E" rx="3" />
    <rect x="20" y="38" width="40" height="6" class="accent-cyan bar-3" rx="3" />
    <text x="130" y="44" class="text text-dim" font-size="10">99.8% SAFE</text>
  </g>

  <!-- PCB_ROUTE -->
  <g transform="translate(30, 345)">
    <circle cx="5" cy="10" r="4" class="accent-green pulse-dot" />
    <text x="20" y="14" class="text" font-weight="bold">PCB RL ROUTER (RL)</text>
    <text x="20" y="30" class="text text-dim" font-size="10">Policy: PPO Optimization</text>
    <text x="20" y="45" class="text" font-size="10" fill="#10B981">EFFICIENCY: +40% ROUTE</text>
  </g>
  
  <!-- Panel Right: Live Logs -->
  <rect x="310" y="70" width="475" height="365" class="panel-bg" />
  
  <!-- Tab header -->
  <path d="M310,70 L420,70 L430,90 L310,90 Z" fill="#141B2E" />
  <text x="325" y="84" class="text" font-weight="bold" fill="#00F0FF">LIVE_RUN_LOGS</text>
  <line x1="310" y1="90" x2="785" y2="90" stroke="#1F2E4D" stroke-width="1" />
  
  <!-- Hidden Overflow Box for Terminal Logs -->
  <svg x="325" y="105" width="445" height="315" viewBox="0 0 445 315">
    <g class="log-container">
      <text y="20" class="text" fill="#10B981">[SYSTEM] Launching telemetry stream...</text>
      <text y="42" class="text">[Andromeda] LangGraph orchestrator initialized.</text>
      <text y="64" class="text" fill="#A855F7">[Centaurus] Building graph instance from Neo4j DB...</text>
      <text y="86" class="text">[Centaurus] Identity resolution complete (47 nodes mapped).</text>
      <text y="108" class="text">[Andromeda] Multi-Agent task dispatched: "Evaluate security policy".</text>
      <text y="130" class="text" fill="#F59E0B">[Oskar] Query input received -> Evaluating uncertainty entropy...</text>
      <text y="152" class="text">[Oskar] Entropy: 0.12 (Audit passed, safe to process).</text>
      <text y="174" class="text">[Andromeda] Calling MCP Server:clinvar-database via APIv2...</text>
      <text y="196" class="text" fill="#10B981">[Andromeda] MCP Success: clinvar retrieved 4 records.</text>
      <text y="218" class="text">[PCB Router] Initializing sequential PCB routing simulation...</text>
      <text y="240" class="text">[PCB Router] RL Agent policy (PPO) converging. Reward: +40% route optimization.</text>
      <text y="262" class="text" fill="#10B981">[SYSTEM] Telemetry loop complete. Restarting monitoring...</text>
      <text y="284" class="text" fill="#10B981">[SYSTEM] Launching telemetry stream...</text>
      <text y="306" class="text">[Andromeda] LangGraph orchestrator initialized.</text>
      <text y="328" class="text" fill="#A855F7">[Centaurus] Building graph instance from Neo4j DB...</text>
      <text y="350" class="text">[Centaurus] Identity resolution complete (47 nodes mapped).</text>
      <text y="372" class="text">[Andromeda] Multi-Agent task dispatched: "Evaluate security policy".</text>
    </g>
  </svg>

  <!-- Scanning laser line overlay -->
  <line x1="0" y1="0" x2="800" y2="450" class="scan" />
</svg>
