<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="100%" height="450">
  <style>
    /* Global styles */
    .bg { fill: #080C14; }
    .grid { stroke: #141B2E; stroke-width: 1; stroke-dasharray: 4,4; }
    .panel-bg { fill: #0D1424; stroke: #1F2E4D; stroke-width: 1; rx: 5; }
    .text { font-family: 'Fira Code', 'Consolas', monospace; font-size: 12px; fill: #E2E8F0; }
    .text-dim { fill: #64748B; }
    .accent-cyan { fill: #00F0FF; }
    .stroke-cyan { stroke: #00F0FF; }
    .accent-green { fill: #10B981; }
    .stroke-green { stroke: #10B981; }
    .accent-purple { fill: #A855F7; }
    .accent-orange { fill: #F59E0B; }
    
    /* Animations */
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; filter: drop-shadow(0 0 4px #00F0FF); }
    }
    .pulse-dot { animation: pulse 2s infinite ease-in-out; }
    
    @keyframes scanline {
      0% { transform: translateY(0); }
      100% { transform: translateY(450px); }
    }
    .scan { stroke: #00F0FF; stroke-width: 0.5; opacity: 0.15; animation: scanline 6s linear infinite; }
    
    /* Bar animations */
    @keyframes bar-fill-1 { 0%, 100% { width: 95px; } 50% { width: 90px; } }
    @keyframes bar-fill-2 { 0%, 100% { width: 85px; } 50% { width: 80px; } }
    @keyframes bar-fill-3 { 0%, 100% { width: 90px; } 50% { width: 85px; } }
    @keyframes bar-fill-4 { 0%, 100% { width: 80px; } 50% { width: 75px; } }
    .bar-1 { animation: bar-fill-1 3s infinite ease-in-out; }
    .bar-2 { animation: bar-fill-2 4s infinite ease-in-out; }
    .bar-3 { animation: bar-fill-3 5s infinite ease-in-out; }
    .bar-4 { animation: bar-fill-4 4s infinite ease-in-out; }

    /* Scroll log animations */
    @keyframes scroll-logs {
      0%, 9% { transform: translateY(0); }
      10%, 19% { transform: translateY(-22px); }
      20%, 29% { transform: translateY(-44px); }
      30%, 39% { transform: translateY(-66px); }
      40%, 49% { transform: translateY(-88px); }
      50%, 59% { transform: translateY(-110px); }
      60%, 69% { transform: translateY(-132px); }
      70%, 79% { transform: translateY(-154px); }
      80%, 89% { transform: translateY(-176px); }
      90%, 100% { transform: translateY(-198px); }
    }
    .log-container { animation: scroll-logs 25s steps(10) infinite; }
  </style>

  <defs>
    <!-- Grid Pattern -->
    <pattern id="grid-pattern" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="40" y2="0" class="grid" />
      <line x1="0" y1="0" x2="0" y2="40" class="grid" />
    </pattern>
    <!-- Glowing Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="bg" />
  <rect width="100%" height="100%" fill="url(#grid-pattern)" />
  
  <!-- Header Bar -->
  <rect x="15" y="15" width="770" height="40" class="panel-bg" />
  <circle cx="35" cy="35" r="5" class="accent-green pulse-dot" filter="url(#glow)" />
  <text x="50" y="39" class="text" font-weight="bold">KUNAL_SAINI // COGNITIVE_SYSTEM_TELEMETRY</text>
  <text x="520" y="39" class="text text-dim">STATUS: <tspan class="accent-green">ACTIVE</tspan> | ARCH: <tspan class="accent-cyan">SYSTEMS</tspan> | TYPE: <tspan class="accent-purple">BUILDER</tspan></text>
  
  <!-- Panel Left: System Registry -->
  <rect x="15" y="70" width="280" height="365" class="panel-bg" />
  <text x="30" y="95" class="text" font-weight="bold" fill="#00F0FF">SYSTEM CONFIGURATION</text>
  <line x1="30" y1="105" x2="280" y2="105" stroke="#1F2E4D" stroke-width="1" />
  
  <!-- Identity -->
  <g transform="translate(30, 120)">
    <text x="0" y="14" class="text" font-weight="bold" fill="#00F0FF">IDENTITY_REGISTRY</text>
    <text x="10" y="32" class="text" font-size="11">NAME: <tspan class="text-dim">Kunal Saini</tspan></text>
    <text x="10" y="48" class="text" font-size="11">ROLE: <tspan class="text-dim">AI System Architect</tspan></text>
    <text x="10" y="64" class="text" font-size="11">FOCUS: <tspan class="text-dim">Intelligent Systems</tspan></text>
  </g>

  <!-- Skill Matrix (Animated Load Bars) -->
  <g transform="translate(30, 215)">
    <text x="0" y="14" class="text" font-weight="bold" fill="#00F0FF">COGNITIVE_LOAD</text>
    
    <!-- Agentic AI -->
    <text x="10" y="32" class="text" font-size="11">Agentic AI (LangGraph)</text>
    <rect x="10" y="38" width="100" height="6" fill="#141B2E" rx="3" />
    <rect x="10" y="38" width="95" height="6" class="accent-cyan bar-1" rx="3" />
    <text x="120" y="44" class="text text-dim" font-size="10">95%</text>

    <!-- GraphRAG -->
    <text x="10" y="62" class="text" font-size="11">GraphRAG / Knowledge Graphs</text>
    <rect x="10" y="68" width="100" height="6" fill="#141B2E" rx="3" />
    <rect x="10" y="68" width="90" height="6" class="accent-cyan bar-3" rx="3" />
    <text x="120" y="74" class="text text-dim" font-size="10">90%</text>

    <!-- RAG Infrastructure -->
    <text x="10" y="92" class="text" font-size="11">Neo4j / Qdrant RAG</text>
    <rect x="10" y="98" width="100" height="6" fill="#141B2E" rx="3" />
    <rect x="10" y="98" width="85" height="6" class="accent-cyan bar-2" rx="3" />
    <text x="120" y="104" class="text text-dim" font-size="10">85%</text>

    <!-- Reinforcement Learning -->
    <text x="10" y="122" class="text" font-size="11">RL (PPO Routing)</text>
    <rect x="10" y="128" width="100" height="6" fill="#141B2E" rx="3" />
    <rect x="10" y="128" width="80" height="6" class="accent-cyan bar-4" rx="3" />
    <text x="120" y="134" class="text text-dim" font-size="10">80%</text>
  </g>
  
  <!-- Panel Right: Live Logs -->
  <rect x="310" y="70" width="475" height="365" class="panel-bg" />
  
  <!-- Tab header -->
  <path d="M310,70 L420,70 L430,90 L310,90 Z" fill="#141B2E" />
  <text x="325" y="84" class="text" font-weight="bold" fill="#00F0FF">COGNITIVE_LOGS</text>
  <line x1="310" y1="90" x2="785" y2="90" stroke="#1F2E4D" stroke-width="1" />
  
  <!-- Hidden Overflow Box for Terminal Logs -->
  <svg x="325" y="105" width="445" height="315" viewBox="0 0 445 315">
    <g class="log-container">
      <text y="20" class="text" fill="#10B981">[System] Initializing Kunal Saini profile engine...</text>
      <text y="42" class="text">[Philosophy] Loaded: "Models are important, but systems create value."</text>
      <text y="64" class="text" fill="#A855F7">[Cognition] LangGraph multi-agent orchestration active.</text>
      <text y="86" class="text">[Cognition] Neo4j GraphRAG database linked.</text>
      <text y="108" class="text" fill="#F59E0B">[Project] ANDROMEDA: Production-ready agent platform loaded.</text>
      <text y="130" class="text">[Project] CENTAURUS: Enterprise knowledge engine mapped.</text>
      <text y="152" class="text">[Project] OSKAR: AI Safety uncertainty framework active.</text>
      <text y="174" class="text">[Project] PCB-RL: Reinforcement routing model active (+40% eff).</text>
      <text y="196" class="text" fill="#10B981">[Workflow] Current mode: Research -> Prototype -> Fail -> Iterate -> Deploy.</text>
      <text y="218" class="text">[Status] Cognitive system online. Ready for collaboration.</text>
      <text y="240" class="text" fill="#10B981">[System] Re-running telemetry cycle...</text>
      <text y="262" class="text" fill="#10B981">[System] Initializing Kunal Saini profile engine...</text>
      <text y="284" class="text">[Philosophy] Loaded: "Models are important, but systems create value."</text>
      <text y="306" class="text" fill="#A855F7">[Cognition] LangGraph multi-agent orchestration active.</text>
      <text y="328" class="text">[Cognition] Neo4j GraphRAG database linked.</text>
      <text y="350" class="text" fill="#F59E0B">[Project] ANDROMEDA: Production-ready agent platform loaded.</text>
      <text y="372" class="text">[Project] CENTAURUS: Enterprise knowledge engine mapped.</text>
    </g>
  </svg>

  <!-- Scanning laser line overlay -->
  <line x1="0" y1="0" x2="800" y2="450" class="scan" />
</svg>
